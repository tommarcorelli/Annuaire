          <button class="cat-pill" data-cat="Développement">Développement</button>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">// FAVORIS</div>
        <div class="fav-io">
          <button class="fav-io-btn" id="exportFavBtn" title="Sauvegarder mes favoris dans un fichier">💾 Exporter</button>
          <button class="fav-io-btn" id="importFavBtn" title="Restaurer des favoris depuis un fichier">📥 Importer</button>
          <input type="file" id="importFavFile" accept="application/json" hidden/>
        </div>
        <span class="fav-io-status" id="favIoStatus"></span>
      </div>

      <div class="sidebar-stat">
        <span id="sidebarCount">—</span>
        <span class="stat-label">commandes</span>
      </div>

      <a href="installation.html" class="fav-io-btn" style="display:block;text-align:center;margin:14px 14px 0;text-decoration:none;color:#00b4d8;border-color:#00b4d8">💿 Guides d'installation ISO →</a>
    </aside>

    <main class="main">
      <div id="commandGrid" class="command-grid"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">⌀</div>
        <p>Aucune commande trouvée</p>
        <small>Essaie un autre terme ou change les filtres</small>
      </div>
    </main>
  </div>

  <template id="cardTemplate">
    <article class="cmd-card">
      <div class="card-header">
        <code class="cmd-name"></code>
        <div class="card-actions">
          <button class="fav-btn" title="Ajouter aux favoris">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>
          <button class="link-btn" title="Copier le lien direct">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M10 13a5 5 0 007.07 0l2.83-2.83a5 5 0 00-7.07-7.07l-1.41 1.41"/>
              <path d="M14 11a5 5 0 00-7.07 0L4.1 13.83a5 5 0 007.07 7.07l1.41-1.41"/>
            </svg>
          </button>
          <button class="copy-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            <span class="copy-label">Copier</span>
          </button>
        </div>
      </div>
      <div class="card-badges">
        <span class="os-badge"></span>
        <span class="cat-badge"></span>
        <a class="quiz-badge" title="Réviser ce domaine en quiz">🎓 quiz</a>
      </div>
      <p class="cmd-desc"></p>
      <div class="syntax-block">
        <span class="block-label">Syntaxe</span>
        <code class="cmd-syntax"></code>
      </div>
      <div class="examples-block">
        <span class="block-label">Exemples</span>
        <div class="examples-list"></div>
      </div>
      <div class="cmd-flags">
        <span class="block-label">Options</span>
        <ul class="flags-list"></ul>
      </div>
    </article>
  </template>

  <script src="js/data/data.js"></script>
  <script src="js/data/data-extra.js"></script>
  <script src="js/data/scenarios-data.js"></script>

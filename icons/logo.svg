<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MANPAGES.EXE">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d0d44"/>
      <stop offset="0.55" stop-color="#120826"/>
      <stop offset="1" stop-color="#0a0417"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ff2e88" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#ff2e88" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ff2e88" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slash" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#ff1f7a"/>
      <stop offset="0.5" stop-color="#ff64a6"/>
      <stop offset="1" stop-color="#ffd60a"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2e88"/>
      <stop offset="1" stop-color="#5ce1ff"/>
    </linearGradient>
    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="3" fill="#ffffff" opacity="0.035"/>
    </pattern>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="url(#glow)"/>
    <rect width="512" height="512" fill="url(#scan)"/>

    <!-- écho cyan (aberration chromatique) -->
    <g transform="translate(-13,7)" opacity="0.7" filter="url(#neon)">
      <polygon points="150,392 208,392 330,150 272,150" fill="#5ce1ff"/>
      <polygon points="248,392 306,392 428,150 370,150" fill="#5ce1ff"/>
    </g>

    <!-- les // signature -->
    <g filter="url(#neon)">
      <polygon points="150,392 208,392 330,150 272,150" fill="url(#slash)"/>
      <polygon points="248,392 306,392 428,150 370,150" fill="url(#slash)"/>
      <!-- reflet lame de katana -->
      <polygon points="150,392 162,392 284,150 272,150" fill="#ffffff" opacity="0.6"/>
      <polygon points="248,392 260,392 382,150 370,150" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- prompt terminal : curseur clignotant -->
    <rect x="196" y="416" width="120" height="26" rx="4" fill="#5ce1ff" filter="url(#neon)"/>

    <!-- coins panel arcade -->
    <g stroke="#ff2e88" stroke-width="5" fill="none" opacity="0.55">
      <polyline points="40,92 40,40 92,40"/>
      <polyline points="472,92 472,40 420,40"/>
      <polyline points="40,420 40,472 92,472"/>
      <polyline points="472,420 472,472 420,472"/>
    </g>

    <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="url(#edge)" stroke-width="10" opacity="0.9"/>
  </g>
</svg>

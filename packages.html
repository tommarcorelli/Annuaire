<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MANPAGES.EXE — Paquets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=VT323&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/favicon-32.png"/>
  <meta name="theme-color" content="#0f0820"/>
  <script>/* Thème : préférence sauvegardée, sinon réglage système */(function(){var t=localStorage.getItem('mpx-theme');if(!t)t=window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    :root,[data-theme="dark"]{
      --bg:#0f0820;--bg2:#160d2e;--bg3:#1f1340;
      --border:#2d1f5a;--border2:#3d2a73;
      --accent:#ff2e88;--accent2:#5ce1ff;--accent3:#ffd60a;
      --text:#d9d2e8;--ink:#f5f0e1;--muted:#8576b8;
      --mono:'JetBrains Mono',monospace;--pixel:'VT323','JetBrains Mono',monospace;
      --nav-h:54px;
    }
    [data-theme="light"]{
      --bg:#f5f1e6;--bg2:#ecdfc8;--bg3:#fffaf0;
      --border:#1a1a24;--border2:#3a3a44;
      --accent:#e63946;--accent2:#2a6df4;--accent3:#ffba08;
      --text:#1a1a24;--ink:#0e0e16;--muted:#5a5a6a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{overflow-x:hidden;}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;overflow-x:hidden;}

    /* NAV */
    .nav{
      height:var(--nav-h);display:flex;align-items:center;gap:12px;
      padding:0 16px;background:var(--bg2);border-bottom:2px solid var(--border2);
      position:sticky;top:0;z-index:50;
    }
    .nav-logo{font-family:var(--pixel);font-size:20px;color:var(--ink);text-decoration:none;white-space:nowrap;}
    .nav-logo span{color:var(--accent);}
    .nav-tabs{display:flex;gap:4px;}
    .nav-tab{
      padding:5px 12px;font-family:var(--pixel);font-size:14px;
      border:2px solid var(--border2);background:transparent;
      color:var(--muted);cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;
    }
    .nav-tab:hover,.nav-tab.active{border-color:var(--accent2);color:var(--accent2);}
    .nav-tab.active{background:rgba(92,225,255,.08);}
    .nav-search{
      margin-left:auto;background:var(--bg3);border:2px solid var(--border2);
      color:var(--text);font-family:var(--mono);font-size:12px;
      padding:5px 10px;outline:none;width:200px;transition:border-color .15s;
    }
    .nav-search:focus{border-color:var(--accent2);}
    .nav-search::placeholder{color:var(--muted);}
    .theme-btn{
      background:transparent;border:2px solid var(--border2);color:var(--muted);
      width:34px;height:34px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;transition:all .15s;
    }
    .theme-btn:hover{border-color:var(--accent3);color:var(--accent3);}
    .theme-btn svg{width:14px;height:14px;}
    [data-theme="dark"] .i-sun{display:none;}
    [data-theme="light"] .i-moon{display:none;}

    /* HERO */
    .hero{padding:28px 20px 20px;text-align:center;border-bottom:2px solid var(--border);}
    .eyebrow{font-family:var(--pixel);font-size:14px;color:var(--accent);letter-spacing:.12em;margin-bottom:8px;}
    .hero-title{font-family:var(--pixel);font-size:clamp(26px,4vw,42px);color:var(--ink);letter-spacing:.06em;}
    .hero-title span{color:var(--accent2);}
    .hero-sub{color:var(--muted);font-size:11px;margin-top:6px;}

    /* FILTRES */
    .cat-bar{
      display:flex;gap:4px;flex-wrap:wrap;padding:10px 16px;
      border-bottom:2px solid var(--border);background:var(--bg2);
      position:sticky;top:var(--nav-h);z-index:40;
    }
    .cat-btn{
      padding:3px 10px;font-family:var(--pixel);font-size:13px;
      border:2px solid var(--border2);background:transparent;
      color:var(--muted);cursor:pointer;transition:all .12s;white-space:nowrap;
    }
    .cat-btn:hover{border-color:var(--accent3);color:var(--accent3);}
    .cat-btn.active{border-color:var(--accent3);color:var(--accent3);background:rgba(255,214,10,.08);}

    /* STATS */
    .stats-bar{
      padding:5px 16px;font-size:11px;color:var(--muted);
      border-bottom:1px solid var(--border);background:var(--bg);
    }
    .stats-bar span{color:var(--accent3);}

    /* TABLEAU SCROLL */
    .tbl-scroll{overflow-x:auto;padding:16px;}

    /* TABLEAU */
    table{border-collapse:collapse;width:100%;table-layout:fixed;}

    /* EN-TÊTE */
    thead th{
      background:var(--bg2);border:1px solid var(--border2);
      padding:6px 8px;text-align:center;white-space:nowrap;
    }
    thead th:first-child{text-align:left;width:150px;}
    .th-inner{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .th-icon{
      width:20px;height:20px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
    }
    .th-icon img,.th-icon svg{width:11px;height:11px;filter:brightness(0) invert(1);}
    .th-label{font-family:var(--pixel);font-size:9px;color:var(--muted);}

    /* LIGNE GROUPE */
    .row-group td{
      background:var(--bg2);font-family:var(--pixel);font-size:11px;
      padding:3px 8px;border-top:2px solid var(--border2);
      letter-spacing:.1em;
    }

    /* LIGNE PAQUET */
    tbody tr{border-bottom:1px solid var(--border);}
    tbody tr:hover{background:var(--bg3);}
    tbody td{padding:5px 6px;border-right:1px solid var(--border);vertical-align:middle;}
    tbody td:last-child{border-right:none;}

    /* CELLULE NOM */
    .td-name{width:150px;min-width:150px;}
    .pkg-name{font-family:var(--pixel);font-size:14px;color:var(--ink);display:block;}
    .pkg-desc{color:var(--muted);font-size:9px;line-height:1.3;margin-top:1px;display:block;}
    .pkg-badge{
      display:inline-block;margin-top:2px;
      padding:0 4px;font-size:8px;font-family:var(--pixel);
      border:1px solid;letter-spacing:.04em;
    }

    /* CELLULE COMMANDE */
    .td-cmd{min-width:130px;}
    .cmd-btn{
      display:flex;align-items:center;gap:4px;width:100%;
      background:var(--bg3);border:1px solid var(--border2);
      padding:3px 6px;cursor:pointer;transition:border-color .12s;
    }
    .cmd-btn:hover{border-color:var(--accent2);}
    .cmd-btn code{
      flex:1;font-family:var(--mono);font-size:10px;color:var(--accent2);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;
    }
    .cmd-btn .ico{flex-shrink:0;color:var(--muted);}
    .cmd-btn .ico svg{width:9px;height:9px;display:block;}
    .cmd-btn.copied{border-color:var(--accent3);}
    .cmd-btn.copied code{color:var(--accent3);}

    /* CELLULE N/A */
    .td-na{text-align:center;color:var(--border2);font-size:12px;}

    /* VIDE */
    .empty{display:none;text-align:center;padding:50px;color:var(--muted);font-family:var(--pixel);font-size:16px;}
    .empty.show{display:block;}
  </style>
</head>

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copy(text, btn){
  navigator.clipboard.writeText(text).then(function(){
    btn.classList.add('copied');
    var c = btn.querySelector('code');
    var orig = c.textContent;
    c.textContent = '✓ Copié !';
    setTimeout(function(){ btn.classList.remove('copied'); c.textContent = orig; }, 1500);
  });
}

function makeCell(cmd){
  var td = document.createElement('td');
  if(!cmd){ td.className='td-na'; td.textContent='—'; return td; }
  td.className='td-cmd';
  var btn = document.createElement('button');
  btn.className='cmd-btn';
  btn.innerHTML='<code>'+esc(cmd)+'</code><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></span>';
  btn.addEventListener('click', function(){ copy(cmd, btn); });
  td.appendChild(btn);
  return td;
}

var activeCat='all', q='';

function render(){
  var tbody = document.getElementById('tbody');
  var empty = document.getElementById('empty');
  var count = document.getElementById('count');
  tbody.innerHTML='';

  var filtered = PACKAGES.filter(function(p){
    if(activeCat!=='all' && p.cat!==activeCat) return false;
    if(q){
      var hay = p.name+' '+p.desc+' '+p.cat;
      OS.forEach(function(o){ if(p[o]) hay+=' '+p[o]; });
      if(hay.toLowerCase().indexOf(q)===-1) return false;
    }
    return true;
  });

  if(!filtered.length){ empty.classList.add('show'); count.textContent='0'; return; }
  empty.classList.remove('show');
  count.textContent = filtered.length;

  // Grouper par cat
  var seen={}, cats=[];
  filtered.forEach(function(p){ if(!seen[p.cat]){ seen[p.cat]=true; cats.push(p.cat); } });

  cats.forEach(function(cat){
    var color = CAT_COLOR[cat]||'var(--accent)';
    var gr = document.createElement('tr');
    gr.className='row-group';
    var td = document.createElement('td');
    td.colSpan=OS.length+1;
    td.textContent='// '+cat.toUpperCase();
    td.style.color=color;
    gr.appendChild(td);
    tbody.appendChild(gr);

    filtered.filter(function(p){ return p.cat===cat; }).forEach(function(pkg){
      var tr = document.createElement('tr');
      var nameTd = document.createElement('td');
      nameTd.className='td-name';
      var col = CAT_COLOR[pkg.cat]||'var(--accent)';
      nameTd.innerHTML =
        '<span class="pkg-name">'+esc(pkg.name)+'</span>'+
        '<span class="pkg-desc">'+esc(pkg.desc)+'</span>'+
        '<span class="pkg-badge" style="color:'+col+';border-color:'+col+'">'+esc(pkg.cat)+'</span>';
      tr.appendChild(nameTd);
      OS.forEach(function(os){ tr.appendChild(makeCell(pkg[os]||null)); });
      tbody.appendChild(tr);
    });
  });
}

document.getElementById('catBar').addEventListener('click', function(e){
  var btn=e.target.closest('[data-cat]'); if(!btn) return;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  activeCat=btn.dataset.cat; render();
});

document.getElementById('search').addEventListener('input', function(){
  q=this.value.trim().toLowerCase(); render();
});

document.addEventListener('keydown', function(e){
  var tag=document.activeElement&&document.activeElement.tagName;
  if(e.key==='/'&&tag!=='INPUT'){ e.preventDefault(); document.getElementById('search').focus(); }
  if(e.key==='Escape'&&tag==='INPUT') document.activeElement.blur();
});

// Thème
(function(){
  var html=document.documentElement;
  var s=localStorage.getItem('mpx-theme'); if(s) html.setAttribute('data-theme',s);
  document.getElementById('themeBtn').addEventListener('click',function(){
    var n=(html.getAttribute('data-theme')||'dark')==='dark'?'light':'dark';
    html.setAttribute('data-theme',n); localStorage.setItem('mpx-theme',n);
  });
})();

render();
